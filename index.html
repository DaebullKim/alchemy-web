<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연금 제작 최적화 계산기 (v2.1)</title>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: var(--primary); }
        h1 { border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        
        details { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        summary { font-weight: 700; cursor: pointer; outline: none; font-size: 1.1em; color: var(--accent); }
        .grid-row { display: grid; grid-template-columns: 180px 1fr 1fr 1fr; gap: 10px; align-items: center; margin-top: 8px; padding-bottom: 8px; border-bottom: 1px dashed #cbd5e1; }
        .grid-row:last-child { border-bottom: none; }
        .label { font-weight: 600; font-size: 0.95em; }
        input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; text-align: right; }
        
        .btn-calc { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-calc:hover { background: #2563eb; }

        .result-box { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 30px; font-size: 0.95em; }
        th, td { padding: 12px; border: 1px solid #cbd5e1; text-align: center; }
        th { background: #e2e8f0; font-weight: 700; }
        td.name-col { text-align: left; font-weight: 600; background: #f8fafc; }
        .highlight { color: #dc2626; font-weight: bold; }
        .total-profit { font-size: 1.3em; color: #16a34a; font-weight: bold; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>연금술 제작 최적화</h1>

    <div id="inputs">
        <details open>
            <summary>1. 원재료 (필수 입력)</summary>
            <div id="raw_area"></div>
        </details>
        <details>
            <summary>2. 가공품 재고 (정수/에센스/엘릭서)</summary>
            <div id="refined_area"></div>
        </details>
        <details>
            <summary>3. 조합품 재고 (중간재료)</summary>
            <div id="inter_area"></div>
        </details>
    </div>

    <button class="btn-calc" onclick="runCalculation()">최적화 연산 실행 (오차율 0%)</button>

    <div id="loading" style="display:none; text-align:center; margin-top:20px; font-weight:bold; color:#3b82f6;">서버에서 최적의 조합을 계산 중입니다...</div>
    <div id="result" class="result-box"></div>
</div>

<script>
    const BOX = 3456, SET = 64;
    
    // 데이터 정의
    const struct = {
        raw: {
            "1": ["1_굴", "1_소라", "1_문어", "1_미역", "1_성게"],
            "2": ["2_굴", "2_소라", "2_문어", "2_미역", "2_성게"],
            "3": ["3_굴", "3_소라", "3_문어", "3_미역", "3_성게"]
        },
        refined: {
            "1": ["1_수호의 정수", "1_파동의 정수", "1_혼란의 정수", "1_생명의 정수", "1_부식의 정수"],
            "2": ["2_수호 에센스", "2_파동 에센스", "2_혼란 에센스", "2_생명 에센스", "2_부식 에센스"],
            "3": ["3_수호 엘릭서", "3_파동 엘릭서", "3_혼란 엘릭서", "3_생명 엘릭서", "3_부식 엘릭서"]
        },
        inter: {
            "1": ["1_물결 수호", "1_파동 오염", "1_질서 파괴", "1_활력 붕괴", "1_침식 방어"],
            "2": ["2_활기 보존", "2_파도 침식", "2_방어 오염", "2_격류 재생", "2_맹독 혼란"],
            "3": ["3_불멸 재생", "3_파동 장벽", "3_타락 침식", "3_생명 광란", "3_맹독 파동"]
        }
    };

    // UI 생성 헬퍼
    function createRow(id, label) {
        // '1_굴' 형태에서 숫자 떼고 이름만 표시
        const displayName = label.replace(/^[1-3]_/, ''); 
        return `
            <div class="grid-row" id="row_${id}">
                <div class="label">${label.charAt(0)}성 ${displayName}</div>
                <input type="number" class="box" placeholder="상자 (3456개)" min="0">
                <input type="number" class="set" placeholder="세트 (64개)" min="0">
                <input type="number" class="unit" placeholder="낱개" min="0">
            </div>`;
    }

    function init() {
        ['raw', 'refined', 'inter'].forEach(type => {
            let html = '';
            [1, 2, 3].forEach(tier => {
                struct[type][tier].forEach(item => {
                    html += createRow(item, item);
                });
            });
            document.getElementById(`${type}_area`).innerHTML = html;
        });
    }

    // 포맷팅 함수 (수량을 상자/세트/낱개로 쪼개줌)
    function formatQty(val) {
        if(val === 0) return "-";
        const b = Math.floor(val / BOX);
        let rem = val % BOX;
        const s = Math.floor(rem / SET);
        const u = rem % SET;
        
        let txt = `<span class="highlight">${val.toLocaleString()}개</span> (`;
        if(b>0) txt += `${b}상자 `;
        if(s>0) txt += `${s}세트 `;
        if(u>0) txt += `${u}개`;
        if(b===0 && s===0) txt += "단일";
        txt += `)`;
        return txt.replace(/\(단일\)/, '').trim();
    }

    // 결과 테이블 생성
    function buildTable(title, dataObj) {
        if(Object.keys(dataObj).length === 0) return "<p>제작/소모 내역 없음</p>";
        let rows = "";
        for(const [k, v] of Object.entries(dataObj)) {
            const cleanName = k.replace(/^[1-3]_/, '');
            const b = Math.floor(v / BOX);
            const s = Math.floor((v % BOX) / SET);
            const u = v % SET;
            
            rows += `
                <tr>
                    <td class="name-col">${k.charAt(0) !== k.charAt(1) && k.match(/^[1-3]_/) ? k.charAt(0)+'성 ' : ''}${cleanName}</td>
                    <td class="highlight">${v.toLocaleString()}</td>
                    <td>${b > 0 ? b : '-'}</td>
                    <td>${s > 0 ? s : '-'}</td>
                    <td>${u > 0 ? u : '-'}</td>
                </tr>`;
        }
        return `
            <h3>${title}</h3>
            <table>
                <thead>
                    <tr><th>아이템명</th><th>총 개수</th><th>상자 (3456)</th><th>세트 (64)</th><th>낱개</th></tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function runCalculation() {
        const payload = { raw: {}, refined: {}, inter: {} };
        
        ['raw', 'refined', 'inter'].forEach(type => {
            [1, 2, 3].forEach(tier => {
                struct[type][tier].forEach(item => {
                    const row = document.getElementById(`row_${item}`);
                    const b = parseInt(row.querySelector('.box').value) || 0;
                    const s = parseInt(row.querySelector('.set').value) || 0;
                    const u = parseInt(row.querySelector('.unit').value) || 0;
                    const total = (b * BOX) + (s * SET) + u;
                    if(total > 0) payload[type][item] = total;
                });
            });
        });

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').innerHTML = '';

        try {
            // 주의: 여기에 본인의 백엔드 API 주소를 입력하세요!
            const response = await fetch('https://api-test-08ld.onrender.com/api/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            let html = "";
            ['route1', 'route2'].forEach(r => {
                const routeName = r === 'route1' ? '💎 루트 1: 판매금액 극대화' : '🔥 루트 2: 재료 소진 극대화';
                const routeData = data[r];
                
                html += `<h2 style="margin-top:40px;">${routeName}</h2>`;
                if(!routeData.success) {
                    html += `<p style="color:red;">계산 가능한 조합이 없습니다.</p><hr>`;
                    return;
                }

                html += `<div class="total-profit">예상 총 수익: ${routeData.profit.toLocaleString()} 골드</div>`;
                html += buildTable('1. 최종 판매 연금품 획득량', routeData.final_goods);
                html += buildTable('2. 제작 지시: 조합품 (새로 만들어야 할 수량)', routeData.inter_craft);
                html += buildTable('3. 제작 지시: 가공품 (원재료에서 변환해야 할 수량)', routeData.refined_craft);
                html += buildTable('4. 작업 후 남는 원재료', routeData.raw_remains);
                html += `<hr style="margin:40px 0; border:1px dashed #cbd5e1;">`;
            });

            document.getElementById('result').innerHTML = html;
        } catch(e) {
            alert("서버 연결에 실패했습니다. 백엔드 주소를 확인하세요.");
            console.error(e);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 초기화 실행
    init();
</script>
</body>
</html>
